name: TypeScript Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Test against active LTS versions of Node.js
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Speeds up builds by caching dependencies

    - name: Install dependencies
      # Using 'npm ci' is recommended for automated environments 
      # as it strictly follows the package-lock.json
      run: npm ci

    - name: Build TypeScript
      # Assumes you have a "build": "tsc" script in your package.json
      run: npm run build

    - name: Run tests
      # Optional: Runs if you have a "test" script defined
      run: npm test --if-present
