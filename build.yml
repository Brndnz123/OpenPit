name: C++ CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code into the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Install required Linux display and graphics headers for GLFW/OpenGL
    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols libgl1-mesa-dev libglu1-mesa-dev

    # 3. Configure the project using the CMakeLists.txt
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++

    # 4. Compile the code
    - name: Build
      run: cmake --build build --config Release --parallel
