name: C++ CMake Build (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Download the code into the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configure CMake for Visual Studio 2022 (64-bit)
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    # 3. Compile the code using MSBuild
    - name: Build
      run: cmake --build build --config Release --parallel

    # 4. (Optional) Upload the compiled .exe so you can download and run it!
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenPit3D-Windows
        path: build/Release/OpenPit3D.exe # Adjust if your executable name is different
